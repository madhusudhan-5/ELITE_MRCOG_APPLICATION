server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com; # REPLACE WITH ACTUAL DOMAIN

    # Serve the React Frontend
    location / {
        root /var/www/elitemrcog/elitemrcog_frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for Django Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Django Static Files (Backend Admin)
    location /static/ {
        alias /var/www/elitemrcog/elitemrcog_backend/static/;
    }

    # Serve Media Files (Uploaded PDFs/Videos)
    location /media/ {
        alias /var/www/elitemrcog/elitemrcog_backend/media/;
    }
}

# Reverse proxy for Uptime Kuma (Monitoring Dashboard)
server {
    listen 80;
    server_name status.yourdomain.com; # REPLACE WITH SUBDOMAIN

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
